<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restrições</title>
  <link rel="icon" href="/Images/favicon.ico" />
  <link rel="stylesheet" href="../../Estilos/tela_3 - restricoes.css" />
</head>
<body><div>    <a class="voltar" href="tela_2 - cadastro.html">Voltar</a></div>
  <div class="container">


    <div class="card"><img src="../../Images/logo.png"/>
      <h2>Selecione sua restrição alimentar</h2>

      <details>
        <summary>Diabetes</summary>
        <div class="options">
          <label><input type="checkbox"> Diabetes tipo 1</label>
          <label><input type="checkbox"> Diabetes tipo 2</label>
          <label><input type="checkbox"> Diabetes gestacional</label>
          <label><input type="checkbox"> Outros tipos específicos (MODY, LADA, secundários)</label>
        </div>
      </details>

      <details>
        <summary>Doença Celíaca e Sensibilidade ao Glúten</summary>
        <div class="options">
          <label><input type="checkbox"> Doença celíaca clássica</label>
          <label><input type="checkbox"> Doença celíaca atípica/assintomática</label>
          <label><input type="checkbox"> Dermatite herpetiforme (manifestação cutânea)</label>
          <label><input type="checkbox"> Sensibilidade ao glúten não celíaca</label>
        </div>
      </details>

      <details>
        <summary>Alergias Alimentares</summary>
        <div class="options">
          <label><input type="checkbox"> Alergia ao leite de vaca</label>
          <label><input type="checkbox"> Alergia ao ovo</label>
          <label><input type="checkbox"> Alergia ao trigo</label>
          <label><input type="checkbox"> Alergia à soja</label>
          <label><input type="checkbox"> Alergia a castanhas e nozes (avelã, amêndoa, etc.)</label>
          <label><input type="checkbox"> Alergia a frutos do mar (crustáceos como camarão, caranguejo)</label>
          <label><input type="checkbox"> Alergia a peixes (salmão, atum, bacalhau, etc.)</label>
          <label><input type="checkbox"> Alergia ao gergelim (em crescente globalmente)</label>
          <label><input type="checkbox" id="alergia-oral"> Síndrome da alergia oral (reação cruzada pólen-alimento)</label>
        </div>
      </details>


      <details>
        <summary>Intolerâncias Alimentares</summary>
        <div class="options">
          <label><input type="checkbox"> Intolerância à lactose</label>
          <label><input type="checkbox"> Intolerância à frutose</label>
          <label><input type="checkbox"> Intolerância ao sorbitol/manitol (poliálcoois)</label>
          <label><input type="checkbox"> Sensibilidade à cafeína</label>
          <label><input type="checkbox"> Sensibilidade à histamina (intolerância à histamina)</label>
        </div>
      </details>

      <details>
        <summary>Doenças Gastrointestinais Relacionadas à Dieta</summary>
        <div class="options">
          <label><input type="checkbox"> Síndrome do intestino irritável (cebola, alho, feijão, maçã)</label>
          <label><input type="checkbox"> Doença inflamatória intestinal (Alimentos ultraprocessados, fibras insolúveis)</label>
          <label><input type="checkbox"> Refluxo gastroesofágico</label>
        </div>
      </details>
    </div>

    <a class="avancar" id="btn-avancar" href="../tela_4 - menu-principal.html">Avançar</a>
  </div>

  <!-- Scripts necessários -->
  <script src="../../Script/config.js"></script>
  <script src="../../Script/api.service.js"></script>
  <script src="../../Script/utils.js"></script>
  <script src="../../Script/tela_4 - restricoes.js"></script>
</body>
</html>
